version: "0.2"

metadata:
  project: "openlakeforge"
  owner: "data-platform"
  description: "Sales POC Bronze to Silver Floe contracts."
  tags: ["iteration-3", "sales", "silver"]

report:
  path: "floe/reports/sales"
  storage: "lakehouse_s3"

storages:
  default: "lakehouse_s3"
  definitions:
    - name: "lakehouse_s3"
      type: "s3"
      bucket: "iceberg-data"
      region: "us-east-1"

catalogs:
  default: "polaris"
  definitions:
    - name: "polaris"
      type: "rest"
      uri: "http://polaris:8181/api/catalog"
      credential: "client_credentials:${POLARIS_FLOE_CLIENT_ID}:${POLARIS_FLOE_CLIENT_SECRET}"
      warehouse: "lakehouse"
      oauth2_server_uri: "http://polaris:8181/api/catalog/v1/oauth/tokens"
      scope: "PRINCIPAL_ROLE:ALL"
      warehouse_storage: "lakehouse_s3"
      warehouse_prefix: "silver"

entities:
  - name: "sales"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "bronze/sales/sales"
      storage: "lakehouse_s3"
      options:
        header: true
        separator: ","
        encoding: "utf-8"
        glob: "*.csv"
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "silver/sales/sales"
        storage: "lakehouse_s3"
        iceberg:
          catalog: "polaris"
          namespace: "sales"
          table: "sales"
      rejected:
        format: "csv"
        path: "floe/rejected/sales/sales"
        storage: "lakehouse_s3"
    policy:
      severity: "reject"
    schema:
      normalize_columns:
        enabled: true
        strategy: "snake_case"
      primary_key: ["sale_id"]
      columns:
        - { name: "sale_id", type: "string", nullable: false }
        - { name: "customer_id", type: "string", nullable: false }
        - { name: "product_id", type: "string", nullable: false }
        - { name: "sale_date", type: "date", nullable: false }
        - { name: "quantity", type: "integer", nullable: false }
        - { name: "unit_price", type: "number", nullable: false }
        - { name: "region", type: "string", nullable: false }

  - name: "customers"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "bronze/sales/customers"
      storage: "lakehouse_s3"
      options:
        header: true
        separator: ","
        encoding: "utf-8"
        glob: "*.csv"
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "silver/sales/customers"
        storage: "lakehouse_s3"
        iceberg:
          catalog: "polaris"
          namespace: "sales"
          table: "customers"
      rejected:
        format: "csv"
        path: "floe/rejected/sales/customers"
        storage: "lakehouse_s3"
    policy:
      severity: "reject"
    schema:
      normalize_columns:
        enabled: true
        strategy: "snake_case"
      primary_key: ["customer_id"]
      columns:
        - { name: "customer_id", type: "string", nullable: false }
        - { name: "first_name", type: "string", nullable: false }
        - { name: "last_name", type: "string", nullable: false }
        - { name: "country", type: "string", nullable: false }
        - { name: "segment", type: "string", nullable: false }

  - name: "products"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "bronze/sales/products"
      storage: "lakehouse_s3"
      options:
        header: true
        separator: ","
        encoding: "utf-8"
        glob: "*.csv"
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "silver/sales/products"
        storage: "lakehouse_s3"
        iceberg:
          catalog: "polaris"
          namespace: "sales"
          table: "products"
      rejected:
        format: "csv"
        path: "floe/rejected/sales/products"
        storage: "lakehouse_s3"
    policy:
      severity: "reject"
    schema:
      normalize_columns:
        enabled: true
        strategy: "snake_case"
      primary_key: ["product_id"]
      columns:
        - { name: "product_id", type: "string", nullable: false }
        - { name: "product_name", type: "string", nullable: false }
        - { name: "category", type: "string", nullable: false }
        - { name: "unit_cost", type: "number", nullable: false }
