version: "0.2"

metadata:
  project: "openlakeforge"
  owner: "sales"
  description: "Order Revenue Bronze to Silver Floe contracts."
  tags: ["sales", "order_revenue", "silver"]

report:
  path: "floe/reports/sales/order_revenue"
  storage: "openlakeforge_ops"

entities:
  - name: "orders"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/order_revenue/orders"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/order_revenue/orders"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_order_revenue_silver", table: "orders" }
      rejected: { format: "csv", path: "floe/rejected/sales/order_revenue/orders", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["order_id"]
      columns:
        - { name: "order_id", type: "string", nullable: false }
        - { name: "customer_id", type: "string", nullable: false }
        - { name: "order_date", type: "date", nullable: false }
        - { name: "channel_id", type: "string", nullable: false }
        - { name: "promotion_id", type: "string", nullable: false }
        - { name: "region", type: "string", nullable: false }
        - { name: "status", type: "string", nullable: false }

  - name: "order_lines"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/order_revenue/order_lines"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/order_revenue/order_lines"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_order_revenue_silver", table: "order_lines" }
      rejected: { format: "csv", path: "floe/rejected/sales/order_revenue/order_lines", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["line_id"]
      columns:
        - { name: "line_id", type: "string", nullable: false }
        - { name: "order_id", type: "string", nullable: false }
        - { name: "product_id", type: "string", nullable: false }
        - { name: "quantity", type: "integer", nullable: false }
        - { name: "unit_price", type: "number", nullable: false }
        - { name: "discount_amount", type: "number", nullable: false }

  - name: "products"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/order_revenue/products"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/order_revenue/products"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_order_revenue_silver", table: "products" }
      rejected: { format: "csv", path: "floe/rejected/sales/order_revenue/products", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["product_id"]
      columns:
        - { name: "product_id", type: "string", nullable: false }
        - { name: "product_name", type: "string", nullable: false }
        - { name: "category", type: "string", nullable: false }
        - { name: "unit_cost", type: "number", nullable: false }

  - name: "channels"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/order_revenue/channels"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/order_revenue/channels"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_order_revenue_silver", table: "channels" }
      rejected: { format: "csv", path: "floe/rejected/sales/order_revenue/channels", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["channel_id"]
      columns:
        - { name: "channel_id", type: "string", nullable: false }
        - { name: "channel_name", type: "string", nullable: false }
        - { name: "channel_type", type: "string", nullable: false }

  - name: "promotions"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/order_revenue/promotions"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/order_revenue/promotions"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_order_revenue_silver", table: "promotions" }
      rejected: { format: "csv", path: "floe/rejected/sales/order_revenue/promotions", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["promotion_id"]
      columns:
        - { name: "promotion_id", type: "string", nullable: false }
        - { name: "promotion_name", type: "string", nullable: false }
        - { name: "discount_type", type: "string", nullable: false }
