version: "0.2"

metadata:
  project: "openlakeforge"
  owner: "sales"
  description: "Customer Health Bronze to Silver Floe contracts."
  tags: ["sales", "customer_health", "silver"]

storages:
  default: "lakehouse_bronze"
  definitions:
    - name: "lakehouse_bronze"
      type: "s3"
      bucket: "{{OPENLAKEFORGE_STORAGE_BRONZE_BUCKET}}"
      region: "{{OPENLAKEFORGE_STORAGE_REGION}}"
    - name: "lakehouse_silver"
      type: "s3"
      bucket: "{{OPENLAKEFORGE_STORAGE_SILVER_BUCKET}}"
      region: "{{OPENLAKEFORGE_STORAGE_REGION}}"
    - name: "openlakeforge_ops"
      type: "s3"
      bucket: "{{OPENLAKEFORGE_OPS_BUCKET_NAME}}"
      region: "{{OPENLAKEFORGE_STORAGE_REGION}}"

report:
  path: "floe/reports/sales/customer_health"
  storage: "openlakeforge_ops"

entities:
  - name: "accounts"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/customer_health/accounts"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/customer_health/accounts"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_customer_health_silver", table: "accounts" }
      rejected: { format: "csv", path: "floe/rejected/sales/customer_health/accounts", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["account_id"]
      columns:
        - { name: "account_id", type: "string", nullable: false }
        - { name: "account_name", type: "string", nullable: false }
        - { name: "segment", type: "string", nullable: false }
        - { name: "region", type: "string", nullable: false }
        - { name: "signup_date", type: "date", nullable: false }
        - { name: "arr", type: "number", nullable: false }

  - name: "subscriptions"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/customer_health/subscriptions"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/customer_health/subscriptions"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_customer_health_silver", table: "subscriptions" }
      rejected: { format: "csv", path: "floe/rejected/sales/customer_health/subscriptions", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["subscription_id"]
      columns:
        - { name: "subscription_id", type: "string", nullable: false }
        - { name: "account_id", type: "string", nullable: false }
        - { name: "plan_name", type: "string", nullable: false }
        - { name: "status", type: "string", nullable: false }
        - { name: "start_date", type: "date", nullable: false }
        - { name: "renewal_date", type: "date", nullable: false }
        - { name: "monthly_recurring_revenue", type: "number", nullable: false }

  - name: "support_tickets"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/customer_health/support_tickets"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/customer_health/support_tickets"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_customer_health_silver", table: "support_tickets" }
      rejected: { format: "csv", path: "floe/rejected/sales/customer_health/support_tickets", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["ticket_id"]
      columns:
        - { name: "ticket_id", type: "string", nullable: false }
        - { name: "account_id", type: "string", nullable: false }
        - { name: "opened_date", type: "date", nullable: false }
        - { name: "priority", type: "string", nullable: false }
        - { name: "resolution_hours", type: "integer", nullable: false }
        - { name: "sla_met", type: "boolean", nullable: false }

  - name: "nps_responses"
    incremental_mode: "none"
    source:
      format: "csv"
      path: "sales/customer_health/nps_responses"
      storage: "lakehouse_bronze"
      options: { header: true, separator: ",", encoding: "utf-8", glob: "*.csv" }
      cast_mode: "strict"
    sink:
      write_mode: "overwrite"
      accepted:
        format: "iceberg"
        path: "sales/customer_health/nps_responses"
        storage: "lakehouse_silver"
        iceberg: { catalog: "iceberg_catalog", namespace: "sales_customer_health_silver", table: "nps_responses" }
      rejected: { format: "csv", path: "floe/rejected/sales/customer_health/nps_responses", storage: "lakehouse_silver" }
    policy: { severity: "reject" }
    schema:
      normalize_columns: { enabled: true, strategy: "snake_case" }
      primary_key: ["response_id"]
      columns:
        - { name: "response_id", type: "string", nullable: false }
        - { name: "account_id", type: "string", nullable: false }
        - { name: "response_date", type: "date", nullable: false }
        - { name: "score", type: "integer", nullable: false }
