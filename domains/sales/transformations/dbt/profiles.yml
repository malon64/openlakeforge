sales_poc:
  target: local
  outputs:
    local:
      type: duckdb
      path: "{{ env_var('OPENLAKEFORGE_DBT_DUCKDB_PATH', '/tmp/openlakeforge-sales-dbt.duckdb') }}"
      threads: 1
      extensions:
        - httpfs
        - parquet
        - iceberg
    local_runtime:
      type: duckdb
      path: "{{ env_var('OPENLAKEFORGE_DBT_DUCKDB_PATH', '/tmp/openlakeforge-sales-dbt.duckdb') }}"
      threads: 1
      extensions:
        - httpfs
        - parquet
        - iceberg
      secrets:
        - type: s3
          name: openlakeforge_s3_secret
          key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
          secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"
          region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
          endpoint: "{{ env_var('OPENLAKEFORGE_DUCKDB_S3_ENDPOINT', 'seaweedfs-s3:8333') }}"
          url_style: path
          use_ssl: false
        - type: iceberg
          name: openlakeforge_polaris_secret
          client_id: "{{ env_var('POLARIS_DBT_CLIENT_ID') }}"
          client_secret: "{{ env_var('POLARIS_DBT_CLIENT_SECRET') }}"
          oauth2_server_uri: "{{ env_var('POLARIS_TOKEN_URI') }}"
          oauth2_scope: "{{ env_var('POLARIS_OAUTH_SCOPE', 'PRINCIPAL_ROLE:ALL') }}"
      attach:
        - path: "{{ env_var('POLARIS_WAREHOUSE', 'lakehouse') }}"
          alias: polaris
          options:
            type: iceberg
            secret: openlakeforge_polaris_secret
            endpoint: "{{ env_var('POLARIS_REST_URI') }}"
            access_delegation_mode: none
