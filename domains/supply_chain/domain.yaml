name: supply_chain
displayName: Supply Chain
domainType: Source-aligned
description: Supply Chain proof-of-concept domain for inventory and supplier reliability analytics.
status: planned
owners: []
medallion:
  bronze:
    owner: ingestion
    description: Raw immutable landing zone.
  silver:
    owner: floe
    description: Technically validated Iceberg tables.
  gold:
    owner: dbt
    description: Business-ready marts and analytics models.
data_products:
  - id: inventory_reliability
    name: supply_chain_inventory_reliability
    displayName: Supply Chain Inventory Reliability
    description: Curated inventory position, supplier delivery, and stockout risk marts for Supply Chain.
    status: planned
    asset_prefix: supply_chain_inventory_reliability
    bronze:
      - name: warehouses
        path: s3://lakehouse-bronze/supply_chain/inventory_reliability/warehouses
        description: Raw CSV warehouse dimension.
      - name: suppliers
        path: s3://lakehouse-bronze/supply_chain/inventory_reliability/suppliers
        description: Raw CSV supplier dimension.
      - name: inventory_snapshots
        path: s3://lakehouse-bronze/supply_chain/inventory_reliability/inventory_snapshots
        description: Raw CSV inventory snapshots.
      - name: purchase_orders
        path: s3://lakehouse-bronze/supply_chain/inventory_reliability/purchase_orders
        description: Raw CSV purchase orders.
      - name: shipments
        path: s3://lakehouse-bronze/supply_chain/inventory_reliability/shipments
        description: Raw CSV shipments.
      - name: stockout_events
        path: s3://lakehouse-bronze/supply_chain/inventory_reliability/stockout_events
        description: Raw CSV stockout events.
    silver_tables:
      schema: polaris.lakehouse_dev.supply_chain_inventory_reliability_silver
      tables:
        - name: warehouses
          description: Validated warehouse dimension.
        - name: suppliers
          description: Validated supplier dimension.
        - name: inventory_snapshots
          description: Validated inventory snapshot facts.
        - name: purchase_orders
          description: Validated purchase order facts.
        - name: shipments
          description: Validated shipment facts.
        - name: stockout_events
          description: Validated stockout event facts.
    gold_tables:
      schema: polaris.lakehouse_dev.supply_chain_inventory_reliability_gold
      tables:
        - name: mart_inventory_position
          description: Latest inventory position and reorder status by product and warehouse.
        - name: mart_supplier_delivery_reliability
          description: Supplier delivery lateness, fill rate, and on-time performance.
        - name: mart_stockout_risk
          description: Stockout risk by product and warehouse using current inventory and stockout history.
    assets:
      - type: table
        fqn: polaris.lakehouse_dev.supply_chain_inventory_reliability_gold.mart_inventory_position
      - type: table
        fqn: polaris.lakehouse_dev.supply_chain_inventory_reliability_gold.mart_supplier_delivery_reliability
      - type: table
        fqn: polaris.lakehouse_dev.supply_chain_inventory_reliability_gold.mart_stockout_risk
