# Apache Polaris Iceberg REST Catalog — local kind cluster
# Chart: polaris/polaris  (https://downloads.apache.org/polaris/helm-chart)
# Docs:  https://polaris.apache.org/releases/latest/helm-chart/

image:
  repository: apache/polaris
  tag: "1.4.1"
  pullPolicy: IfNotPresent

replicaCount: 1

# In-memory metastore: stateless, reset on pod restart — fine for local dev.
# Switch to relational-jdbc + PostgreSQL for persistent local state.
polaris:
  persistence:
    type: in-memory

extraEnv:
  # Bootstrap credentials injected at first startup: REALM,clientId,clientSecret
  - name: POLARIS_BOOTSTRAP_CREDENTIALS
    value: "POLARIS,root,polaris-secret"
  - name: AWS_REGION
    value: "us-east-1"
  # SeaweedFS S3 endpoint (AWS SDK v2 env var)
  - name: AWS_ENDPOINT_URL_S3
    value: "http://seaweedfs-s3:8333"
  # Force path-style access for local S3-compatible storage.
  - name: AWS_S3_FORCE_PATH_STYLE
    value: "true"
  # SeaweedFS S3 key/secret loaded from the Secret created by bootstrap-seaweedfs.sh.
  # Keep these in extraEnv because the Polaris chart renders it directly into
  # the Deployment; extraEnvFrom is not rendered by chart 1.4.1.
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: seaweedfs-s3-creds
        key: AWS_ACCESS_KEY_ID
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: seaweedfs-s3-creds
        key: AWS_SECRET_ACCESS_KEY

service:
  type: ClusterIP
  port: 8181

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    memory: 1Gi
