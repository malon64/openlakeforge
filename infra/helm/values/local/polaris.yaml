# Apache Polaris Iceberg REST catalog for the local kind cluster.
image:
  repository: apache/polaris
  tag: "1.4.0@sha256:ef4947a3fd005ca5b2aec2bde98682a59996d38f21c16c4660fbb79e4c20b40c"
  pullPolicy: IfNotPresent

replicaCount: 1

# In-memory metastore is intentionally ephemeral for local development.
polaris:
  persistence:
    type: in-memory

service:
  type: ClusterIP
  port: 8181

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    memory: 1Gi
