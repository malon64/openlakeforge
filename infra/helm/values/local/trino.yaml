# Trino SQL query engine for the local kind cluster.
image:
  tag: "480@sha256:1565e8cac299a32dd9177a4da2d748da4ceb9f1560a9c409d1d18fd72ea5253e"

server:
  workers: 0

coordinator:
  deployment:
    # Kind shares the Docker VM with provider image builds. Avoid running two
    # 2 GiB coordinators during an update, which can otherwise starve both.
    strategy:
      type: Recreate
  # Concurrent cloud image builds can temporarily starve the Docker VM that
  # hosts Kind. Give Trino enough startup budget to survive that contention.
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 120
    successThreshold: 1
  jvm:
    maxHeapSize: "2G"
  config:
    query:
      maxMemoryPerNode: "1GB"
    nodeScheduler:
      includeCoordinator: true
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 3Gi

service:
  type: ClusterIP
  port: 8080
