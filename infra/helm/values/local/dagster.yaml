# Dagster orchestration layer for the local kind cluster.
dagsterWebserver:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

dagsterDaemon:
  enabled: true
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

postgresql:
  enabled: false

computeLogManager:
  type: S3ComputeLogManager
  config:
    s3ComputeLogManager:
      bucket: openlakeforge-ops
      localDir: /tmp/dagster-compute-logs
      prefix: logs/dagster/compute
      useSsl: false
      verify: false
      endpointUrl: http://seaweedfs-s3:8333
      region: us-east-1
      skipEmptyFiles: true

telemetry:
  enabled: false
