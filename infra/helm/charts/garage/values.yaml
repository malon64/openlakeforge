image:
  repository: dxflrs/amd64_garage
  tag: "v1.3.1"
  pullPolicy: IfNotPresent

garage:
  # Must be exactly 64 hex characters
  rpcSecret: "abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789"
  replicationFactor: 1
  dbEngine: "lmdb"
  s3Region: "us-east-1"
  adminToken: "local-dev-admin-token"

persistence:
  meta:
    size: 500Mi
    storageClass: standard
  data:
    size: 5Gi
    storageClass: standard

service:
  type: ClusterIP
  s3Port: 3900
  rpcPort: 3901
  adminPort: 3903

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
