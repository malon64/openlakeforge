apiVersion: v1
kind: Service
metadata:
  name: {{ include "garage.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "garage.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "garage.selectorLabels" . | nindent 4 }}
  ports:
    - name: s3
      port: {{ .Values.service.s3Port }}
      targetPort: s3
    - name: admin
      port: {{ .Values.service.adminPort }}
      targetPort: admin
---
# Headless service for stable StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ include "garage.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "garage.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "garage.selectorLabels" . | nindent 4 }}
  ports:
    - name: rpc
      port: {{ .Values.service.rpcPort }}
      targetPort: rpc
