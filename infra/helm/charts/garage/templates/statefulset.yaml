apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "garage.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "garage.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "garage.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "garage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "garage.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: garage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/garage/garage"]
          args: ["-c", "/etc/garage/garage.toml", "server"]
          ports:
            - name: s3
              containerPort: {{ .Values.service.s3Port }}
            - name: rpc
              containerPort: {{ .Values.service.rpcPort }}
            - name: admin
              containerPort: {{ .Values.service.adminPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.s3Port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.s3Port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/garage
            - name: meta
              mountPath: /var/lib/garage/meta
            - name: data
              mountPath: /var/lib/garage/data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "garage.fullname" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: meta
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.meta.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.meta.size }}
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.data.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.data.size }}
