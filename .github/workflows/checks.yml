name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  structure:
    name: Validate repository structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check Iteration 0 structure
        run: make check-structure

  infrastructure:
    name: Validate infrastructure contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.8.5

      - name: Setup Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a
        with:
          version: v3.18.6

      - name: Check immutable release inputs
        run: make check-components

      - name: Check Terraform and Helm
        run: make check-infra

  contracts:
    name: Validate provider contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Check provider contract compatibility
        run: make check-contracts

  project-code:
    name: Validate project-code runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Check project-code package
        run: make check-project-code

      - name: Build project-code image
        run: make project-code-image

  tooling:
    name: Validate deployment tooling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Sync tooling environment
        run: uv sync --project tools/olf

      - name: Lint tooling
        run: uv run --project tools/olf ruff check tools/olf

      - name: Test tooling
        run: uv run --project tools/olf pytest tools/olf/tests

  dbt:
    name: Validate product dbt projects
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Check product dbt projects
        run: make check-dbt
