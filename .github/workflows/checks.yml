name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  structure:
    name: Validate repository structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Iteration 0 structure
        run: make check-structure

  infrastructure:
    name: Validate infrastructure contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.6

      - name: Check Terraform and Helm
        run: make check-infra

  contracts:
    name: Validate provider contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check provider contract compatibility
        run: make check-contracts

  project-code:
    name: Validate project-code runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check project-code package
        run: make check-project-code

      - name: Build project-code image
        run: make project-code-image

  dbt:
    name: Validate product dbt projects
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check product dbt projects
        run: make check-dbt
