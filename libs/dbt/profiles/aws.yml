{{PROFILE_NAME}}:
  target: local
  outputs:
    local:
      type: duckdb
      path: "{{ env_var('OPENLAKEFORGE_DBT_DUCKDB_PATH', '{{DEFAULT_DUCKDB_PATH}}') }}"
      schema: {{GOLD_SCHEMA}}
      threads: 1
      extensions:
        - httpfs
        - parquet
        - iceberg
    aws_runtime:
      type: duckdb
      path: "{{ env_var('OPENLAKEFORGE_DBT_DUCKDB_PATH', '{{DEFAULT_DUCKDB_PATH}}') }}"
      schema: {{GOLD_SCHEMA}}
      threads: 1
      extensions:
        - aws
        - httpfs
        - parquet
        - iceberg
      # Works around DuckDB's iceberg extension omitting `location` on createTable
      # against the AWS Glue REST catalog; registers the olf_glue_ensure_iceberg_table
      # UDF used by the iceberg_table materialization. See libs/dbt/duckdb_plugins.
      plugins:
        - module: libs.dbt.duckdb_plugins.glue_iceberg
          alias: glue_iceberg
      secrets:
        - type: s3
          name: openlakeforge_aws_s3_secret
          provider: credential_chain
          region: "{{ env_var('AWS_REGION', 'eu-west-1') }}"
      attach:
        - path: "{{ env_var('OPENLAKEFORGE_CATALOG_GLUE_CATALOG_ID') }}"
          alias: "{{ env_var('OPENLAKEFORGE_CATALOG_WAREHOUSE', env_var('OPENLAKEFORGE_CATALOG_GLUE_DATABASE', 'lakehouse_dev')) }}"
          options:
            type: iceberg
            endpoint: "{{ env_var('OPENLAKEFORGE_CATALOG_GLUE_REST_URI') }}"
            endpoint_type: glue
            access_delegation_mode: none
