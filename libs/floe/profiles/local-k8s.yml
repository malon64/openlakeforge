apiVersion: floe/v1
kind: EnvironmentProfile
metadata:
  name: "local-k8s"
  env: "local"
  description: "Contract-rendered local Kubernetes runner profile for OpenLakeForge Floe assets."
variables:
  OPENLAKEFORGE_STORAGE_BRONZE_BUCKET: "lakehouse-bronze"
  OPENLAKEFORGE_STORAGE_SILVER_BUCKET: "lakehouse-silver"
  OPENLAKEFORGE_OPS_BUCKET_NAME: "openlakeforge-ops"
  OPENLAKEFORGE_STORAGE_REGION: "us-east-1"
catalogs:
  default: "iceberg_catalog"
  definitions:
    - name: "iceberg_catalog"
      type: "rest"
      uri: "http://polaris:8181/api/catalog"
      credential: "client_credentials:${OPENLAKEFORGE_CATALOG_FLOE_CLIENT_ID}:${OPENLAKEFORGE_CATALOG_FLOE_CLIENT_SECRET}"
      warehouse: "lakehouse_dev"
      oauth2_server_uri: "http://polaris:8181/api/catalog/v1/oauth/tokens"
      scope: "PRINCIPAL_ROLE:ALL"
      warehouse_storage: "lakehouse_silver"
      warehouse_prefix: "s3://lakehouse-silver"
execution:
  orchestration:
    strategy: sequential
  runner:
    type: kubernetes_job
    image: ghcr.io/malon64/floe:0.6.10
    namespace: lakehouse
    service_account: dagster
    timeout_seconds: 600
    ttl_seconds_after_finished: 3600
    poll_interval_seconds: 5
    env:
      AWS_REGION: "us-east-1"
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_ALLOW_HTTP: "true"
      AWS_ENDPOINT_URL: "http://seaweedfs-s3:8333"
      AWS_ENDPOINT_URL_S3: "http://seaweedfs-s3:8333"
    secrets:
      - name: AWS_ACCESS_KEY_ID
        secret_name: seaweedfs-s3-creds
        key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        secret_name: seaweedfs-s3-creds
        key: AWS_SECRET_ACCESS_KEY
      - name: OPENLAKEFORGE_CATALOG_FLOE_CLIENT_ID
        secret_name: polaris-floe-creds
        key: POLARIS_FLOE_CLIENT_ID
      - name: OPENLAKEFORGE_CATALOG_FLOE_CLIENT_SECRET
        secret_name: polaris-floe-creds
        key: POLARIS_FLOE_CLIENT_SECRET
      - name: OPENLINEAGE_API_KEY
        secret_name: openmetadata-ingestion-bot
        key: OPENMETADATA_INGESTION_BOT_JWT
lineage:
  url: http://openmetadata:8585
  endpoint: api/v1/openlineage/lineage
  namespace: dagster
  dataset_namespace: polaris
  timeout_secs: 5
validation:
  strict: true
